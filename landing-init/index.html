<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lykky.co — Coming Soon</title>
    <meta name="description" content="GTM Nordic Toolkit. Launching from Oulu, Finland." />
    <meta name="theme-color" content="#050508" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&family=Archivo:wght@200&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="canvas-container"></div>

    <div class="grain"></div>

    <div class="vignette"></div>

    <div class="corner corner--tl">
      <span class="corner__line corner__line--h"></span>
      <span class="corner__line corner__line--v"></span>
      <span class="corner__text">65&deg;01'N&ensp;25&deg;28'E</span>
    </div>
    <div class="corner corner--tr">
      <span class="corner__line corner__line--h"></span>
      <span class="corner__line corner__line--v"></span>
      <span class="corner__text">2026</span>
    </div>
    <div class="corner corner--bl">
      <span class="corner__line corner__line--h"></span>
      <span class="corner__line corner__line--v"></span>
      <span class="corner__text">4 founders</span>
    </div>
    <div class="corner corner--br">
      <span class="corner__line corner__line--h"></span>
      <span class="corner__line corner__line--v"></span>
      <span class="corner__text">Coming Soon</span>
    </div>

    <main class="content">
      <h1 class="logo">Lykky.co</h1>
      <div class="divider"></div>
      <p class="tagline">GTM Nordic Toolkit</p>

      <p class="slogan">The open-source GTM playbook built for founders launching from Oulu.</p>
      <div class="signal">
        <span class="signal__dot"></span>
        <span class="signal__text">Coming Soon</span>
      </div>
    </main>
    <script type="module" src="/main.js"></script>
  </body>
</html>
